# ---------------------------------------------------------------------------
# fly.toml — config Fly.io pour istqb-chatbots
# ---------------------------------------------------------------------------
# Région : cdg (Paris). Change si tu préfères une autre région.
# Volume : `chroma_data` (1Go suffit largement pour le syllabus GenAI).
#
# Avant le 1er deploy :
#   fly launch --no-deploy --copy-config --name istqb-chatbots --region cdg
#   fly volumes create chroma_data --region cdg --size 1
#   fly secrets set OPENAI_API_KEY=... SUPABASE_URL=https://<ref>.supabase.co \
#       SUPABASE_ANON_KEY=eyJ...
#   fly deploy
#   fly ssh console -C "python ingest.py"   # 1re ingestion dans /data/chroma_db
# ---------------------------------------------------------------------------

app = "istqb-chatbots"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  CHROMA_PATH = "/data/chroma_db"
  # SUPABASE_URL + SUPABASE_ANON_KEY sont posés via `fly secrets set` (ils
  # ne sont pas réellement secrets — l'anon key est publique — mais ça
  # évite de les commit dans le repo).
  # ALLOWED_ORIGINS hérite des valeurs par défaut codées dans api.py
  # (Lovable prod + localhost dev). Surchargeable via `fly secrets set`.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

  # Sonde santé : /health est public (pas de JWT requis).
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "chroma_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
