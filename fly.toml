# fly.toml app configuration file generated for istqb-chatbots on 2026-06-07T16:42:05+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'istqb-chatbots'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  CHROMA_PATH = '/data/chroma_db'

[[mounts]]
  source = 'chroma_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    # 30s : Python + chromadb + openai prennent ~5-10s à importer au
    # cold start ; on laisse de la marge pour éviter les faux négatifs.
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
